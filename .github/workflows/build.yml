name: Build AppleDesk IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project AppleDesk.xcodeproj \
            -scheme AppleDesk \
            -configuration Release \
            -archivePath build/AppleDesk.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENTITLEMENTS_REQUIRED=NO \
            SWIFT_COMPILATION_MODE=singlefile \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty || true

          # Verifica se l'archive è stato creato
          if [ ! -d "build/AppleDesk.xcarchive" ]; then
            echo "Archive fallito, riprovo senza xcpretty per vedere i log completi"
            xcodebuild archive \
              -project AppleDesk.xcodeproj \
              -scheme AppleDesk \
              -configuration Release \
              -archivePath build/AppleDesk.xcarchive \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              ENTITLEMENTS_REQUIRED=NO \
              SWIFT_COMPILATION_MODE=singlefile \
              ONLY_ACTIVE_ARCH=NO
          fi

      - name: Package IPA
        run: |
          APP_PATH=$(find build/AppleDesk.xcarchive -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "ERRORE: App non trovata nell'archive!"; exit 1; fi
          echo "App trovata: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AppleDesk.ipa Payload/
          echo "IPA creato con successo!"
          ls -lh AppleDesk.ipa

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppleDesk-IPA
          path: AppleDesk.ipa
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AppleDesk Build #${{ github.run_number }}"
          body: |
            🍎 **AppleDesk IPA** — Build automatica da GitHub Actions
            
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            
            > Installa tramite AltStore, Sideloadly o simili.
          files: AppleDesk.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
